apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-poc
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-poc
  template:
    metadata:
      labels:
        app: nginx-poc
    spec:
      containers:
      - name: nginx-poc
        image: asia-south1-docker.pkg.dev/kiran-499609/poc-repo/nginx-poc:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: 64Mi
            cpu: 50m
          limits:
            memory: 128Mi
            cpu: 100m
