# Internal service for Grafana — only reachable from VPC/Tailscale
apiVersion: v1
kind: Service
metadata:
  name: grafana-internal-lb
  namespace: monitoring
  annotations:
    cloud.google.com/load-balancer-type: "Internal"
    cloud.google.com/backend-config: '{"default": "grafana-backend-config"}'
spec:
  type: LoadBalancer
  loadBalancerIP: ""
  selector:
    app.kubernetes.io/name: grafana
  ports:
  - name: http
    port: 3000
    targetPort: 3000
---
# BackendConfig for Grafana health check
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: grafana-backend-config
  namespace: monitoring
spec:
  healthCheck:
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 2
    type: HTTP
    requestPath: /api/health
    port: 3000
---
# Internal Ingress for ArgoCD — VPC-only access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-internal-ingress
  namespace: argocd
  annotations:
    kubernetes.io/ingress.class: "gce-internal"
    kubernetes.io/ingress.regional-static-ip-name: "argocd-internal-ip"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 80
