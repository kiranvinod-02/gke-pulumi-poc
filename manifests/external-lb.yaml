# =============================================================================
# EXTERNAL HTTPS LOAD BALANCER — User/App Traffic
# Matches GCP target architecture: Cloud Armor → Backend Service 1/2 → GKE Ingress
# =============================================================================

# BackendConfig for general API traffic (Backend Service 1)
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: backend-service-general
  namespace: default
spec:
  securityPolicy:
    name: cloud-armor-policy   # Cloud Armor WAF attached here
  healthCheck:
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 2
    type: HTTP
    requestPath: /
    port: 80
  connectionDraining:
    drainingTimeoutSec: 30
  sessionAffinity:
    affinityType: "CLIENT_IP"
---
# BackendConfig for SSE streaming traffic (Backend Service 2)
# SSE needs longer timeouts — streaming connections stay open
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: backend-service-sse
  namespace: default
spec:
  securityPolicy:
    name: cloud-armor-policy
  healthCheck:
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 2
    type: HTTP
    requestPath: /
    port: 80
  timeoutSec: 3600  # 1 hour — SSE connections are long-lived
  connectionDraining:
    drainingTimeoutSec: 60
---
# Service for general traffic — Backend Service 1
apiVersion: v1
kind: Service
metadata:
  name: nginx-poc-service
  namespace: default
  annotations:
    cloud.google.com/backend-config: '{"default": "backend-service-general"}'
    cloud.google.com/neg: '{"ingress": true}'  # Network Endpoint Group — required for container-native LB
spec:
  type: NodePort
  selector:
    app: nginx-poc
  ports:
  - name: http
    port: 80
    targetPort: 80
    nodePort: 30080
---
# Service for SSE traffic — Backend Service 2
# In Parallel Loop this handles the AI streaming responses (token-by-token)
apiVersion: v1
kind: Service
metadata:
  name: nginx-poc-sse-service
  namespace: default
  annotations:
    cloud.google.com/backend-config: '{"default": "backend-service-sse"}'
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: NodePort
  selector:
    app: nginx-poc
  ports:
  - name: http
    port: 8080
    targetPort: 80
    nodePort: 30081
---
# External Ingress — GKE provisions a GCP External HTTPS LB from this
# Two backend services: /api/* → SSE service, everything else → general service
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-external-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "nginx-external-ip"
    networking.gke.io/managed-certificates: ""  # add cert name here when using managed TLS
spec:
  defaultBackend:
    service:
      name: nginx-poc-service
      port:
        number: 80
  rules:
  - http:
      paths:
      # Backend Service 1 — general traffic (API, dashboard, login)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx-poc-service
            port:
              number: 80
      # Backend Service 2 — SSE streaming (AI responses, real-time events)
      - path: /stream
        pathType: Prefix
        backend:
          service:
            name: nginx-poc-sse-service
            port:
              number: 8080
